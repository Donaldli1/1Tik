<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيقات ذهبية DZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #007bff; 
            --bg-color: #f8f9fa;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-color); color: #333; }

        header { background: var(--white); padding: 15px; text-align: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.8rem; font-weight: bold; color: var(--primary-color); cursor: pointer; }

        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; min-height: 70vh; }

        /* قسم قد يعجبك (التصميم الجديد) */
        .suggestion-section { background: var(--white); padding: 20px; border-radius: 15px; margin-top: 30px; box-shadow: var(--shadow); }
        .suggestion-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .suggestion-header h2 { font-size: 1.2rem; color: #444; }
        .more-link { color: var(--primary-color); font-size: 0.9rem; text-decoration: none; }

        .suggestion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .suggest-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 10px; transition: 0.3s; cursor: pointer; }
        .suggest-item:hover { background: #f0f7ff; }
        .suggest-item img { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; border: 1px solid #eee; }
        .suggest-info h4 { font-size: 0.95rem; margin-bottom: 4px; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }
        .suggest-info span { font-size: 0.8rem; color: #888; }

        /* شبكة التطبيقات الرئيسية */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .app-card { background: var(--white); border-radius: 20px; padding: 20px; text-align: center; box-shadow: var(--shadow); border: 1px solid #eee; transition: 0.3s; }
        .app-card:hover { transform: translateY(-5px); border-color: var(--primary-color); }
        .app-card img { width: 80px; height: 80px; border-radius: 18px; margin-bottom: 12px; }
        .btn-download { display: block; background: var(--primary-color); color: white; padding: 10px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 0.85rem; }

        /* صفحة التوجيه */
        #redirect-container { display: none; text-align: center; background: var(--white); padding: 50px 20px; border-radius: 25px; box-shadow: var(--shadow); }
        .loader { width: 60px; height: 60px; border: 6px solid #f3f3f3; border-top: 6px solid var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .timer-box { font-size: 3rem; font-weight: bold; color: var(--primary-color); }

        /* التذييل */
        footer { background: var(--white); padding: 40px 0 20px; text-align: center; border-top: 1px solid #eee; margin-top: 50px; }
        .footer-nav a { margin: 0 10px; text-decoration: none; color: #666; font-weight: bold; font-size: 0.9rem; }
        .social-icons { margin: 20px 0; }
        .social-icons a { font-size: 1.6rem; margin: 0 10px; color: #444; }
        .footer-rights { font-size: 0.8rem; color: #999; border-top: 1px solid #f9f9f9; padding-top: 15px; }

        @media (max-width: 600px) { .suggestion-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header><div class="logo" onclick="showPage('home')">تطبيقات ذهبية DZ</div></header>

    <div class="container">
        <main id="home-page">
            <div class="grid" id="app-list"></div>

            <section class="suggestion-section">
                <div class="suggestion-header">
                    <h2>قد يعجبك</h2>
                    <a href="#" class="more-link">المزيد <i class="fas fa-chevron-left"></i></a>
                </div>
                <div class="suggestion-grid" id="suggestion-list">
                    </div>
            </section>
        </main>

        <section id="redirect-container">
            <img id="redir-img" src="" style="width: 100px; border-radius: 20px;">
            <h2 id="redir-name" style="margin: 15px 0;"></h2>
            <div class="loader"></div>
            <p>يرجى الانتظار لتجهيز الرابط...</p>
            <div class="timer-box" id="countdown">15</div>
        </section>

        <div id="privacy-page" style="display:none; background:white; padding:30px; border-radius:20px;"><h2>سياسة الخصوصية</h2><p>النص هنا...</p></div>
        <div id="contact-page" style="display:none; background:white; padding:30px; border-radius:20px;"><h2>اتصل بنا</h2><p>النص هنا...</p></div>
    </div>

    <footer>
        <nav class="footer-nav">
            <a href="#" onclick="showPage('home')">الرئيسية</a>
            <a href="#" onclick="showPage('privacy')">سياسة الخصوصية</a>
            <a href="#" onclick="showPage('contact')">اتصل بنا</a>
        </nav>
        <div class="social-icons">
            <a href="#"><i class="fab fa-telegram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
        </div>
        <div class="footer-rights">All rights reserved Osama 40 / 2026</div>
    </footer>

    <script>
        // مصفوفة بيانات شاملة (أضفت المزيد لتظهر العشوائية)
        const allData = [
            { name: "واتساب الذهبي", img: "https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg", link: "#", author: "ابو عرب" },
            { name: "تويتر الذهبي", img: "https://abs.twimg.com/favicons/twitter.2.ico", link: "#", author: "تطبيقات DZ" },
            { name: "انستقرام برو", img: "https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg", link: "#", author: "ابو عرب" },
            { name: "تيك توك بلس", img: "https://v16-webapp.tiktok.com/favicon.ico", link: "#", author: "Tik1" },
            { name: "يوتيوب فينسد", img: "https://www.youtube.com/s/desktop/28ea6185/img/favicon_144x144.png", link: "#", author: "يوتيوب" },
            { name: "تلجرام المميز", img: "https://telegram.org/favicon.ico", link: "#", author: "ابو عرب" },
            { name: "واتساب الازرق", img: "https://via.placeholder.com/60/007bff/fff?text=WA", link: "#", author: "تطبيقات" },
            { name: "سناب بلس", img: "https://via.placeholder.com/60/fffc00/000?text=SC", link: "#", author: "ابو عرب" },
            { name: "فيسبوك معدل", img: "https://facebook.com/favicon.ico", link: "#", author: "فيسبوك" },
            { name: "ملصقات واتساب", img: "https://via.placeholder.com/60/25d366/fff?text=Sticker", link: "#", author: "ملصقات" }
        ];

        function initSite() {
            // عرض التطبيقات في الرئيسية
            const appList = document.getElementById('app-list');
            appList.innerHTML = allData.slice(0, 4).map(app => `
                <div class="app-card">
                    <img src="${app.img}" alt="${app.name}">
                    <h3>${app.name}</h3>
                    <a href="javascript:void(0)" class="btn-download" onclick="startRedirect('${app.name}', '${app.img}', '${app.link}')">تحميل الآن</a>
                </div>
            `).join('');

            // توليد قسم "قد يعجبك" بـ 8 تطبيقات عشوائية
            const shuffled = allData.sort(() => 0.5 - Math.random());
            const suggestionList = document.getElementById('suggestion-list');
            suggestionList.innerHTML = shuffled.slice(0, 8).map(app => `
                <div class="suggest-item" onclick="startRedirect('${app.name}', '${app.img}', '${app.link}')">
                    <img src="${app.img}" alt="${app.name}">
                    <div class="suggest-info">
                        <h4>${app.name}</h4>
                        <span>${app.author}</span>
                    </div>
                </div>
            `).join('');
        }

        function showPage(pageId) {
            document.querySelectorAll('#home-page, #redirect-container, #privacy-page, #contact-page').forEach(el => el.style.display = 'none');
            if(pageId === 'home') { document.getElementById('home-page').style.display = 'block'; initSite(); }
            else document.getElementById(pageId + '-page').style.display = 'block';
            window.scrollTo(0,0);
        }

        function startRedirect(name, img, link) {
            document.getElementById('home-page').style.display = 'none';
            const redirContainer = document.getElementById('redirect-container');
            document.getElementById('redir-img').src = img;
            document.getElementById('redir-name').innerText = name;
            redirContainer.style.display = 'block';
            let timeLeft = 15;
            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById('countdown').innerText = timeLeft;
                if(timeLeft <= 0) { clearInterval(timer); window.location.href = link; }
            }, 1000);
        }

        initSite();
    </script>
</body>
</html>
